<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" rx="20" fill="white"/>

  <!-- Outer circle -->
  <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="8"/>

  <!-- Clock hands (bigger) -->
  <line x1="50" y1="50" x2="50" y2="25"
        stroke="currentColor"
        stroke-width="7"
        stroke-linecap="round"/>

  <line x1="50" y1="50" x2="72" y2="50"
        stroke="currentColor"
        stroke-width="7"
        stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="4.5" fill="currentColor"/>

  <!-- Refined checkmark (tapered look using curve) -->
  <path d="M60 70 Q64 75 68 72 L82 58"
        stroke="#22c55e"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>